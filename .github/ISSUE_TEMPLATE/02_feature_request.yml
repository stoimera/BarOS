name: Feature request
description: Suggest an idea
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem does this solve for bar or restaurant operations?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
